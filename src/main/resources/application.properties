# MySQL configuration
# if running the application locally, use this to connect to MySQL
#spring.datasource.url=jdbc:mysql://localhost:3306/student_db?useSSL=false&serverTimezone=UTC
# If running in Docker, to connect use this to connect to MySQL running on the host machine
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/student_db?useSSL=false&serverTimezone=UTC
# If running in Docker, to connect use this to connect to MySQL running on docker machine
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
